<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{base}">
<head>
  <title th:text="${donation.id == null} ? 'Shto Donacion' : 'Ndrysho Donacionin'">Donacion</title>
</head>
<body>

<div layout:fragment="content" class="container py-4">

  <h1 class="mb-4"
      th:text="${donation.id == null} ? 'Shto Donacion' : 'Ndrysho Donacionin'"></h1>

  <div class="card p-4" style="max-width: 720px;">
    <form th:action="@{${donation.id == null ? '/years/' + year.id + '/donations/add' : '/years/' + year.id + '/donations/' + donation.id + '/edit'}}"
          th:object="${donation}"
          method="post"
          novalidate>

      <input type="hidden" th:field="*{id}">
      <input type="hidden" th:field="*{yearId}">

      <div class="mb-3">
        <label for="donationAmount" class="form-label">Shuma e Donacionit</label>
        <div class="input-group">
          <input id="donationAmount"
                 type="number"
                 step="0.01"
                 class="form-control"
                 th:field="*{donationAmount}"
                 th:classappend="${#fields.hasErrors('donationAmount')} ? ' is-invalid'">
          <span class="input-group-text">€</span>
        </div>
        <div class="invalid-feedback d-block"
             th:if="${#fields.hasErrors('donationAmount')}"
             th:errors="*{donationAmount}"></div>
      </div>

      <div class="mb-3">
        <label for="members" class="form-label">Zgjidh Anëtarët</label>
        <select id="members"
                class="form-select"
                th:field="*{memberIds}"
                multiple
                size="6"
                th:classappend="${#fields.hasErrors('memberIds')} ? ' is-invalid'">
          <option th:each="member : ${members}"
                  th:value="${member.id}"
                  th:text="${member.name + ' ' + member.surname}">
          </option>
        </select>
        <div class="form-text">Mbaj shtypur Ctrl për të zgjedhur më shumë se një anëtar.</div>
        <div class="invalid-feedback d-block"
             th:if="${#fields.hasErrors('memberIds')}"
             th:errors="*{memberIds}"></div>
      </div>

      <div class="invalid-feedback d-block mb-3"
           th:if="${#fields.hasErrors('yearId')}"
           th:errors="*{yearId}"></div>

      <button type="submit" class="btn btn-success">
        <i class="bi bi-check-lg me-1"></i> Ruaj
      </button>
    </form>
  </div>

  <div class="mt-3">
    <a class="btn btn-dark"
       th:href="@{/years/{yearId}/donations(yearId=${year.id})}">
      <i class="bi bi-arrow-left me-1"></i> Kthehu
    </a>
  </div>

</div>

</body>
</html>
