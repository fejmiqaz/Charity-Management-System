<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{base}">
<head>
  <title>Eventet</title>
</head>
<body>

<div layout:fragment="content" class="container py-4">

  <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
    <div>
      <h1 class="mb-1">
        Eventet për Vitin <span th:text="${year.yearValue}"></span>
      </h1>
      <p class="text-secondary mb-0">Menaxho eventet dhe pjesëmarrësit e këtij viti</p>
    </div>
  </div>

  <div class="d-flex flex-wrap gap-2 mb-4">
    <a class="btn btn-dark" th:href="@{/years}">
      <i class="bi bi-arrow-left me-1"></i> Kthehu te Vitet
    </a>

    <a class="btn btn-outline-dark"
       th:href="@{/years/{yearId}(yearId=${year.id})}">
      <i class="bi bi-info-circle me-1"></i> Detajet e Vitit
    </a>

    <a class="btn btn-success"
       th:href="@{/years/{yearId}/events/add-form(yearId=${year.id})}">
      <i class="bi bi-plus-lg me-1"></i> Shto Event
    </a>
  </div>

  <div class="empty-state" th:if="${#lists.isEmpty(events)}">
    <i class="bi bi-calendar-event display-6"></i>
    <p class="mt-3 mb-2">Nuk u gjetën evente për këtë vit.</p>
    <a class="btn btn-success btn-sm"
       th:href="@{/years/{yearId}/events/add-form(yearId=${year.id})}">
      Krijo eventin e parë
    </a>
  </div>

  <div class="card p-0" th:if="${!#lists.isEmpty(events)}">
    <div class="table-responsive">
      <table class="table table-branded table-hover align-middle mb-0">
        <thead>
        <tr>
          <th>ID</th>
          <th>Qëllimi</th>
          <th>Data</th>
          <th>Anëtarët</th>
          <th>Veprimet</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="event : ${events}">
          <td th:text="${event.id}"></td>
          <td class="fw-bold" th:text="${event.purpose}"></td>
          <td th:text="${#temporals.format(event.date, 'yyyy-MM-dd HH:mm')}"></td>

          <td>
            <span class="text-secondary"
                  th:if="${event.memberNames == null or #lists.isEmpty(event.memberNames)}">
              Nuk ka anëtarë
            </span>

            <div class="d-flex flex-wrap gap-2"
                 th:if="${event.memberNames != null and !#lists.isEmpty(event.memberNames)}">
              <span class="badge text-bg-light border p-2"
                    th:each="memberName : ${event.memberNames}"
                    th:text="${memberName}">
              </span>
            </div>
          </td>

          <td>
            <div class="d-flex flex-wrap gap-2">
              <a class="btn btn-sm btn-outline-dark"
                 th:href="@{/years/{yearId}/events/{id}(yearId=${year.id}, id=${event.id})}">
                <i class="bi bi-info-circle me-1"></i> Detajet
              </a>

              <a class="btn btn-sm btn-warning"
                 th:href="@{/years/{yearId}/events/{id}/edit-form(yearId=${year.id}, id=${event.id})}">
                <i class="bi bi-pencil me-1"></i> Ndrysho
              </a>

              <form th:action="@{/years/{yearId}/events/{id}/delete(yearId=${year.id}, id=${event.id})}"
                    method="post">
                <button type="button"
                        class="btn btn-sm btn-danger co-delete-trigger"
                        th:attr="data-item-label=${event.purpose}">
                  <i class="bi bi-trash me-1"></i> Fshij
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

</body>
</html>
