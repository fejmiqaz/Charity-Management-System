  (adjust path to match your controller's return value)

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{base}">
<head>
  <title>Të Gjitha Vitet</title>
</head>
<body>

<div layout:fragment="content" class="container py-4">

  <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
    <div>
      <h1 class="mb-1">Të Gjitha Vitet</h1>
      <p class="text-secondary mb-0">Menaxho vitet e organizatës dhe të dhënat e tyre</p>
    </div>
  </div>

  <div class="d-flex flex-wrap gap-2 mb-4">
    <a class="btn btn-dark" th:href="@{/}">
      <i class="bi bi-house-door me-1"></i> Ballina
    </a>

    <a class="btn btn-success" th:href="@{/years/add-form}">
      <i class="bi bi-plus-lg me-1"></i> Shto Vit
    </a>
  </div>

  <div class="empty-state" th:if="${#lists.isEmpty(years)}">
    <i class="bi bi-calendar-x display-6"></i>
    <p class="mt-3 mb-2">Nuk u gjetën vite.</p>
    <a class="btn btn-success btn-sm" th:href="@{/years/add-form}">Krijo vitin e parë</a>
  </div>

  <div class="card p-0" th:if="${!#lists.isEmpty(years)}">
    <div class="table-responsive">
      <table class="table table-branded table-hover align-middle mb-0">
        <thead>
        <tr>
          <th>ID</th>
          <th>Viti</th>
          <th>Buxheti</th>
          <th>Projektet</th>
          <th>Donacionet</th>
          <th>Eventet</th>
          <th>Detajet e Vitit</th>
          <th>Veprimet</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="year : ${years}">
          <td th:text="${year.id}"></td>
          <td class="fw-bold" th:text="${year.yearValue}"></td>

          <td>
            <a class="btn btn-sm btn-primary" th:href="@{/years/{yearId}/budget(yearId=${year.id})}">
              <i class="bi bi-cash-coin me-1"></i> Shiko Buxhetin
            </a>
          </td>

          <td>
            <a class="btn btn-sm btn-primary" th:href="@{/years/{yearId}/projects(yearId=${year.id})}">
              <i class="bi bi-kanban me-1"></i> Shiko Projektet
            </a>
          </td>

          <td>
            <a class="btn btn-sm btn-primary" th:href="@{/years/{yearId}/donations(yearId=${year.id})}">
              <i class="bi bi-heart me-1"></i> Shiko Donacionet
            </a>
          </td>

          <td>
            <a class="btn btn-sm btn-primary" th:href="@{/years/{yearId}/events(yearId=${year.id})}">
              <i class="bi bi-calendar-event me-1"></i> Shiko Eventet
            </a>
          </td>

          <td>
            <a class="btn btn-sm btn-outline-dark" th:href="@{/years/{id}(id=${year.id})}">
              <i class="bi bi-info-circle me-1"></i> Shiko Detajet
            </a>
          </td>

          <td>
            <div class="d-flex gap-2">
              <a class="btn btn-sm btn-warning" th:href="@{/years/edit-form/{id}(id=${year.id})}">
                <i class="bi bi-pencil me-1"></i> Ndrysho
              </a>
              <form th:action="@{/years/delete/{id}(id=${year.id})}" method="post">
                <button type="button"
                        class="btn btn-sm btn-danger co-delete-trigger"
                        th:attr="data-item-label=${year.yearValue}">
                  <i class="bi bi-trash me-1"></i> Fshij
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

</body>
</html>
