<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{base}">
<head>
  <title th:text="${year.id == null} ? 'Add Year' : 'Edit Year'">Year</title>
</head>
<body>

<div layout:fragment="content" class="container py-4">

  <h1 class="mb-4" th:text="${year.id == null} ? 'Add Year' : 'Edit Year'"></h1>

  <div class="card p-4" style="max-width: 650px;">
    <form th:action="@{${year.id == null ? '/years/add' : '/years/edit/' + year.id}}"
          th:object="${year}"
          method="post"
          novalidate>

      <input type="hidden" th:field="*{id}">

      <div class="mb-3">
        <label for="yearValue" class="form-label">Year</label>

        <input id="yearValue"
               type="number"
               class="form-control"
               th:field="*{yearValue}"
               th:classappend="${#fields.hasErrors('yearValue')} ? ' is-invalid'">

        <div class="invalid-feedback d-block"
             th:if="${#fields.hasErrors('yearValue')}"
             th:errors="*{yearValue}">
        </div>
      </div>

      <button type="submit" class="btn btn-success">
        <i class="bi bi-check-lg me-1"></i> Save
      </button>

    </form>
  </div>

  <div class="mt-3">
    <a class="btn btn-dark" th:href="@{/years}">
      <i class="bi bi-arrow-left me-1"></i> Back
    </a>
  </div>

</div>

</body>
</html>
