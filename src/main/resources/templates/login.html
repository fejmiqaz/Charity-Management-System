<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login - Charity Management System</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    .login-container {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-card {
      background: white;
      padding: 30px;
      width: 400px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    .login-card h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #2c7be5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    .login-btn:hover {
      background: #1a68d1;
    }

    .message {
      margin-bottom: 15px;
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
    }

    .error-message {
      background: #ffe5e5;
      color: #b30000;
    }

    .success-message {
      background: #e7f7e7;
      color: #1d7a1d;
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <h2>Login</h2>

    <div th:if="${param.error}" class="message error-message">
      Invalid email or password.
    </div>

    <div th:if="${param.logout}" class="message success-message">
      You have been logged out successfully.
    </div>

    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label for="username">Email</label>
        <input type="email" id="username" name="username" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>
  </div>
</div>
</body>
</html>
