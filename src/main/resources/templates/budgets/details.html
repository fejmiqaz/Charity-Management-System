<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head>
    <title>Budget Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script th:src="@{/js/main.js}" defer></script>
</head>
<body>
<div class="container">

    <h1>Budget Details</h1>

    <div class="details-card">
        <p><strong>ID:</strong> <span th:text="${budget.id}"></span></p>
        <p><strong>Amount:</strong> <span th:text="${budget.budgetAmount}"></span></p>
        <p><strong>Description:</strong> <span th:text="${budget.description}"></span></p>
    </div>

    <div class="back-link">
        <a th:href="@{/years/{yearId}/budget(yearId=${year.id})}">Back</a>
    </div>

</div>
</body>
</html>
