<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"><head>
    <title>Budget Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">

    <h1 th:text="${budget.id == null} ? 'Add Budget' : 'Edit Budget'"></h1>

    <form class="form-card"
          th:action="@{${budget.id == null ? '/years/' + year.id + '/budget/add' : '/years/' + year.id + '/budget/edit/' + budget.id}}"
          th:object="${budget}"
          method="post">

        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{yearId}">

        <label for="amount">Amount</label>
        <input id="amount" type="number" step="0.01" th:field="*{budgetAmount}">
        <div class="error" th:if="${#fields.hasErrors('budgetAmount')}" th:errors="*{budgetAmount}"></div>

        <label for="description">Description</label>
        <input id="description" type="text" th:field="*{description}" placeholder="Enter description">
        <div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>

        <div class="error" th:if="${#fields.hasErrors('yearId')}" th:errors="*{yearId}"></div>
        <div class="error" th:if="${#fields.hasErrors('donationIds')}" th:errors="*{donationIds}"></div>
        <div class="error" th:if="${#fields.hasErrors('memberIds')}" th:errors="*{memberIds}"></div>

        <button type="submit">Save</button>
    </form>

    <div class="back-link">
        <a th:href="@{/years/{yearId}/budget(yearId=${year.id})}">Back</a>
    </div>

</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
