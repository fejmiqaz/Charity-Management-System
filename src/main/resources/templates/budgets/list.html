<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{base}">
<head><title>Buxheti</title></head>
<body>
<div layout:fragment="content" class="container py-4">
<div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
<div><h1 class="mb-1">Buxheti për Vitin <span th:text="${year.yearValue}"></span></h1>
<p class="text-secondary mb-0">Menaxho buxhetin e vitit</p></div>
</div>

<div class="d-flex flex-wrap gap-2 mb-4">
<a class="btn btn-dark" th:href="@{/years}"><i class="bi bi-arrow-left me-1"></i>Kthehu te Vitet</a>
<a class="btn btn-primary" th:href="@{/years/{yearId}(yearId=${year.id})}"><i class="bi bi-info-circle me-1"></i>Detajet e Vitit</a>
<a class="btn btn-success" th:if="${#lists.isEmpty(budgets)}"
th:href="@{/years/{yearId}/budget/add-form(yearId=${year.id})}">
<i class="bi bi-plus-lg me-1"></i>Shto Buxhet</a>
</div>

<div class="empty-state" th:if="${#lists.isEmpty(budgets)}">
<i class="bi bi-cash-coin display-6"></i>
<p class="mt-3 mb-2">Nuk u gjet buxhet për këtë vit.</p>
<a class="btn btn-success btn-sm" th:href="@{/years/{yearId}/budget/add-form(yearId=${year.id})}">Krijo buxhetin</a>
</div>

<div class="card p-0" th:if="${!#lists.isEmpty(budgets)}">
<div class="table-responsive">
<table class="table table-branded table-hover align-middle mb-0">
<thead><tr><th>ID</th><th>Shuma</th><th>Përshkrimi</th><th>Veprimet</th></tr></thead>
<tbody>
<tr th:each="budget:${budgets}">
<td th:text="${budget.id}"></td>
<td class="fw-bold" th:text="${budget.budgetAmount}+' €'"></td>
<td th:text="${budget.description}"></td>
<td><div class="d-flex gap-2">
<a class="btn btn-sm btn-outline-dark" th:href="@{/years/{yearId}/budget/details/{budgetId}(yearId=${year.id},budgetId=${budget.id})}"><i class="bi bi-info-circle me-1"></i>Detajet</a>
<a class="btn btn-sm btn-warning" th:href="@{/years/{yearId}/budget/edit-form/{budgetId}(yearId=${year.id},budgetId=${budget.id})}"><i class="bi bi-pencil me-1"></i>Ndrysho</a>
<form th:action="@{/years/{yearId}/budget/delete/{budgetId}(yearId=${year.id},budgetId=${budget.id})}" method="post">
<button type="button" class="btn btn-sm btn-danger co-delete-trigger" th:attr="data-item-label=${budget.description}">
<i class="bi bi-trash me-1"></i>Fshij</button></form>
</div></td>
</tr></tbody></table></div></div>
</div></body></html>
