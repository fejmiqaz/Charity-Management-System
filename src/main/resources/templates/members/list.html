<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{base}">
<head>
  <title>Të Gjithë Anëtarët</title>
</head>
<body>

<div layout:fragment="content" class="container py-4">

  <div class="d-flex flex-wrap justify-content-between align-items-center mb-4">
    <div>
      <h1 class="mb-1">Të Gjithë Anëtarët</h1>
      <p class="text-secondary mb-0">Menaxho anëtarët dhe të dhënat e tyre personale</p>
    </div>
  </div>

  <div class="d-flex flex-wrap gap-2 mb-4">
    <a class="btn btn-dark" th:href="@{/}">
      <i class="bi bi-house-door me-1"></i> Ballina
    </a>
    <a class="btn btn-success" th:href="@{/members/add}">
      <i class="bi bi-person-plus me-1"></i> Shto Anëtar
    </a>
  </div>

  <div class="empty-state" th:if="${#lists.isEmpty(members)}">
    <i class="bi bi-people display-6"></i>
    <p class="mt-3 mb-2">Nuk u gjetën anëtarë.</p>
    <a class="btn btn-success btn-sm" th:href="@{/members/add}">
      Krijo anëtarin e parë
    </a>
  </div>

  <div class="card p-0" th:if="${!#lists.isEmpty(members)}">
    <div class="table-responsive">
      <table class="table table-branded table-hover align-middle mb-0">
        <thead>
        <tr>
          <th>ID</th>
          <th>Emri</th>
          <th>Mbiemri</th>
          <th>Shteti</th>
          <th>Qyteti</th>
          <th>Veprimet</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="member : ${members}">
          <td th:text="${member.id}"></td>
          <td class="fw-bold" th:text="${member.name}"></td>
          <td th:text="${member.surname}"></td>
          <td th:text="${member.country}"></td>
          <td th:text="${member.city}"></td>
          <td>
            <div class="d-flex flex-wrap gap-2">
              <a class="btn btn-sm btn-outline-dark"
                 th:href="@{/members/{memberId}(memberId=${member.id})}">
                <i class="bi bi-info-circle me-1"></i> Detajet
              </a>

              <a class="btn btn-sm btn-warning"
                 th:href="@{/members/{memberId}/edit(memberId=${member.id})}">
                <i class="bi bi-pencil me-1"></i> Ndrysho
              </a>

              <form th:action="@{/members/{memberId}/delete(memberId=${member.id})}"
                    method="post">
                <button type="button"
                        class="btn btn-sm btn-danger co-delete-trigger"
                        th:attr="data-item-label=${member.name + ' ' + member.surname}">
                  <i class="bi bi-trash me-1"></i> Fshij
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

</body>
</html>
