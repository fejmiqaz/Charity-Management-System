<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{base}">
<head>
  <title th:text="${editMode} ? 'Ndrysho Anëtarin' : 'Shto Anëtar'">
    Anëtar
  </title>
</head>

<body>

<div layout:fragment="content" class="container py-4">

  <h1 class="mb-4"
      th:text="${editMode} ? 'Ndrysho Anëtarin' : 'Shto Anëtar'">
  </h1>

  <div class="card p-4" style="max-width: 760px;">

    <div class="alert alert-danger"
         th:if="${updateError}"
         th:text="${updateError}">
    </div>

    <form th:action="${editMode}
            ? @{/members/{id}/edit(id=${memberId})}
            : @{/members/add}"
          th:object="${member}"
          method="post"
          novalidate>

      <input type="hidden" th:field="*{id}">
      <input type="hidden" th:field="*{yearId}">

      <div class="row g-3">

        <div class="col-md-6">
          <label for="name" class="form-label">Emri</label>

          <input id="name"
                 type="text"
                 class="form-control"
                 th:field="*{name}"
                 th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'">

          <div class="invalid-feedback d-block"
               th:if="${#fields.hasErrors('name')}"
               th:errors="*{name}">
          </div>
        </div>

        <div class="col-md-6">
          <label for="surname" class="form-label">Mbiemri</label>

          <input id="surname"
                 type="text"
                 class="form-control"
                 th:field="*{surname}"
                 th:classappend="${#fields.hasErrors('surname')} ? ' is-invalid'">

          <div class="invalid-feedback d-block"
               th:if="${#fields.hasErrors('surname')}"
               th:errors="*{surname}">
          </div>
        </div>

        <div class="col-md-6">
          <label for="country" class="form-label">Shteti</label>

          <input id="country"
                 type="text"
                 class="form-control"
                 th:field="*{country}"
                 th:classappend="${#fields.hasErrors('country')} ? ' is-invalid'">

          <div class="invalid-feedback d-block"
               th:if="${#fields.hasErrors('country')}"
               th:errors="*{country}">
          </div>
        </div>

        <div class="col-md-6">
          <label for="city" class="form-label">Qyteti</label>

          <input id="city"
                 type="text"
                 class="form-control"
                 th:field="*{city}"
                 th:classappend="${#fields.hasErrors('city')} ? ' is-invalid'">

          <div class="invalid-feedback d-block"
               th:if="${#fields.hasErrors('city')}"
               th:errors="*{city}">
          </div>
        </div>

        <div class="col-md-6">
          <label for="email" class="form-label">Email</label>

          <input id="email"
                 type="email"
                 class="form-control"
                 th:field="*{email}"
                 th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'">

          <div class="invalid-feedback d-block"
               th:if="${#fields.hasErrors('email')}"
               th:errors="*{email}">
          </div>
        </div>

        <div class="col-md-6">
          <label for="phone" class="form-label">Numri i Telefonit</label>

          <input id="phone"
                 type="text"
                 class="form-control"
                 th:field="*{phone}"
                 th:classappend="${#fields.hasErrors('phone')} ? ' is-invalid'">

          <div class="invalid-feedback d-block"
               th:if="${#fields.hasErrors('phone')}"
               th:errors="*{phone}">
          </div>
        </div>

        <div class="col-md-6">
          <label for="password"
                 class="form-label"
                 th:text="${editMode}
                    ? 'Fjalëkalimi i ri'
                    : 'Fjalëkalimi'">
          </label>

          <input id="password"
                 type="password"
                 class="form-control"
                 th:field="*{password}"
                 autocomplete="new-password"
                 th:placeholder="${editMode}
                    ? 'Lëreni bosh për ta mbajtur fjalëkalimin aktual'
                    : 'Shkruani fjalëkalimin'"
                 th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'">

          <small class="text-muted"
                 th:if="${editMode}">
            Lëreni këtë fushë bosh nëse nuk dëshironi ta ndryshoni
            fjalëkalimin.
          </small>

          <div class="invalid-feedback d-block"
               th:if="${#fields.hasErrors('password')}"
               th:errors="*{password}">
          </div>
        </div>

        <!-- Role can only be selected while adding a member -->
        <div class="col-md-6"
             th:unless="${editMode}">
          <label for="role" class="form-label">Roli</label>

          <select id="role"
                  class="form-select"
                  th:field="*{role}"
                  th:classappend="${#fields.hasErrors('role')} ? ' is-invalid'">

            <option value="" disabled>Zgjidh rolin</option>

            <option th:each="r : ${roles}"
                    th:value="${r}"
                    th:text="${r}">
            </option>
          </select>

          <div class="invalid-feedback d-block"
               th:if="${#fields.hasErrors('role')}"
               th:errors="*{role}">
          </div>
        </div>

        <!-- Preserve the current role during edit -->
        <input th:if="${editMode}"
               type="hidden"
               th:field="*{role}">

      </div>

      <div class="invalid-feedback d-block mt-3"
           th:if="${#fields.hasErrors('yearId')}"
           th:errors="*{yearId}">
      </div>

      <button type="submit"
              class="btn btn-success mt-4">

        <i class="bi bi-check-lg me-1"></i>

        <span th:text="${editMode}
                ? 'Ruaj ndryshimet'
                : 'Shto anëtarin'">
        </span>
      </button>

    </form>
  </div>

  <div class="mt-3">
    <a class="btn btn-dark"
       th:href="@{/members}">
      <i class="bi bi-arrow-left me-1"></i>
      Kthehu
    </a>
  </div>

</div>

</body>
</html>
