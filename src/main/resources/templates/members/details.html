<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{base}">
<head>
  <title>Member Details</title>
</head>
<body>

<div layout:fragment="content" class="container py-4" style="max-width: 800px;">

  <h1 class="mb-3">Member Details</h1>

  <div class="mb-4">
    <a class="btn btn-dark" th:href="@{/members}">
      <i class="bi bi-arrow-left me-1"></i> Back to Members
    </a>
  </div>

  <div class="card text-center p-4 mb-4">
    <i class="bi bi-person-circle display-4 mb-2"></i>
    <span class="display-serif"
          style="font-size: 36px;"
          th:text="${member.name + ' ' + member.surname}">
      First Name Last Name
    </span>
  </div>

  <div class="card p-4 mb-4">
    <h2 class="section-title">Personal Information</h2>

    <div class="kv-row">
      <span class="kv-label">ID</span>
      <span class="kv-value" th:text="${member.id}"></span>
    </div>

    <div class="kv-row">
      <span class="kv-label">First Name</span>
      <span class="kv-value" th:text="${member.name}"></span>
    </div>

    <div class="kv-row">
      <span class="kv-label">Last Name</span>
      <span class="kv-value" th:text="${member.surname}"></span>
    </div>

    <div class="kv-row">
      <span class="kv-label">Country</span>
      <span class="kv-value" th:text="${member.country}"></span>
    </div>

    <div class="kv-row">
      <span class="kv-label">City</span>
      <span class="kv-value" th:text="${member.city}"></span>
    </div>
  </div>

  <div class="card p-4">
    <h2 class="section-title">Contact Information</h2>

    <div class="kv-row">
      <span class="kv-label">Email</span>
      <a class="kv-value text-decoration-none"
         th:href="'mailto:' + ${member.email}"
         th:text="${member.email}">
      </a>
    </div>

    <div class="kv-row">
      <span class="kv-label">Phone Number</span>
      <a class="kv-value text-decoration-none"
         th:href="'tel:' + ${member.phone}"
         th:text="${member.phone}">
      </a>
    </div>
  </div>

</div>

</body>
</html>
