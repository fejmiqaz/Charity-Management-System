<!--
  Save as: src/main/resources/templates/fragments/navbar.html
  Include on any page with:
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav class="navbar navbar-expand-lg navbar-dark co-navbar sticky-top" th:fragment="navbar">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
      <i class="bi bi-heart-fill"></i>
      <span class="brand-text">Charity Organization</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#coNavMain" aria-controls="coNavMain"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="coNavMain">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/}">
            <i class="bi bi-house-door me-1"></i> Home
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/years}">
            <i class="bi bi-calendar3 me-1"></i> Years
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/members}">
            <i class="bi bi-people me-1"></i> Members
          </a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-3" sec:authorize="isAuthenticated()">
        <span class="nav-user d-none d-lg-inline">
          <i class="bi bi-person-circle me-1"></i>
          <span sec:authentication="name">User</span>
        </span>

        <form th:action="@{/logout}" method="post" class="d-flex m-0">
          <input th:if="${_csrf}"
                 type="hidden"
                 th:name="${_csrf.parameterName}"
                 th:value="${_csrf.token}"/>

          <button type="submit" class="btn btn-sm btn-outline-light">
            <i class="bi bi-box-arrow-right me-1"></i> Logout
          </button>
        </form>
      </div>

    </div>
  </div>
</nav>

</body>
</html>
