<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Access Denied</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Project CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .access-denied-page {
            min-height: calc(100vh - 72px);
            display: flex;
            flex-direction: column;
        }

        .access-denied-content {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 64px 0;
        }

        .access-denied-card {
            max-width: 760px;
            margin: 0 auto;
            overflow: hidden;
        }

        .access-denied-icon {
            width: 84px;
            height: 84px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(185, 74, 67, 0.12);
            color: var(--rose);
            font-size: 40px;
        }

        .access-denied-code {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--rose);
            text-transform: uppercase;
        }

        .access-denied-message {
            color: var(--ink-500);
            max-width: 580px;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 576px) {
            .access-denied-content {
                padding: 36px 0;
            }

            .access-denied-card .card-body {
                padding: 28px 20px !important;
            }

            .access-denied-actions {
                flex-direction: column;
            }

            .access-denied-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="access-denied-page">

    <!-- Navbar fragment -->
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <main class="access-denied-content">
        <div class="container">

            <div class="card access-denied-card card-accent-top fade-in">
                <div class="card-body text-center p-5">

                    <div class="access-denied-icon mb-4">
                        <i class="bi bi-shield-lock-fill"></i>
                    </div>

                    <div class="access-denied-code mb-2">
                        Error 403
                    </div>

                    <h1 class="display-5 mb-3">
                        Access Denied
                    </h1>

                    <p class="lead access-denied-message mb-3"
                       th:text="${errorMessage != null and !#strings.isEmpty(errorMessage)
                                ? errorMessage
                                : 'You do not have permission to perform this action.'}">
                        You do not have permission to perform this action.
                    </p>

                    <p class="access-denied-message mb-4">
                        Your account does not have access to this functionality.
                        If you believe this is a mistake, please contact a Head or Subhead.
                    </p>

                    <div class="access-denied-actions d-flex justify-content-center gap-3">
                        <a th:href="@{/}" class="btn btn-primary px-4">
                            <i class="bi bi-house-door me-2"></i>
                            Back to Dashboard
                        </a>

                        <button type="button"
                                class="btn btn-outline-secondary px-4"
                                onclick="history.back()">
                            <i class="bi bi-arrow-left me-2"></i>
                            Go Back
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </main>

    <!-- Footer fragment -->
    <footer th:replace="~{fragments/footer :: footer}"></footer>

</div>

<!-- Bootstrap JavaScript -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Project JavaScript -->
<script th:src="@{/js/main.js}"></script>

</body>
</html>
