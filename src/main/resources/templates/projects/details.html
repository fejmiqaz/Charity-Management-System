<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{base}">
<head>
    <title>Project Details</title>
</head>
<body>

<div layout:fragment="content" class="container py-4" style="max-width: 900px;">

    <h1 class="mb-3">Project Details</h1>

    <div class="mb-4">
        <a class="btn btn-dark"
           th:href="@{/years/{yearId}/projects(yearId=${year.id})}">
            <i class="bi bi-arrow-left me-1"></i> Back to Projects
        </a>

        <a class="btn btn-sm btn-danger"
           th:href="@{/pdf/years/{yearId}/projects/{projectId}(yearId=${year.id}, projectId=${project.id})}"
           sec:authorize="hasAnyRole('HEAD', 'SUBHEAD', 'PROJECT_MANAGER')">
            <i class="bi bi-file-earmark-pdf me-1"></i>
            Export as PDF
        </a>
    </div>

    <div class="card text-center p-4 mb-4">
        <i class="bi bi-kanban display-4 mb-2"></i>

        <span class="display-serif"
              style="font-size: 36px;"
              th:text="${project.name}">
            Project Name
        </span>
    </div>

    <div class="card p-4 mb-4">
        <h2 class="section-title">Project Information</h2>

        <div class="kv-row">
            <span class="kv-label">ID</span>
            <span class="kv-value" th:text="${project.id}"></span>
        </div>

        <div class="kv-row">
            <span class="kv-label">Name</span>
            <span class="kv-value" th:text="${project.name}"></span>
        </div>

        <div class="kv-row">
            <span class="kv-label">Description</span>
            <span class="kv-value text-end"
                  th:text="${project.description}"></span>
        </div>

        <div class="kv-row">
            <span class="kv-label">Status</span>

            <span class="badge rounded-pill"
                  th:text="${project.status}"
                  th:classappend="${project.status != null and project.status.name() == 'FINISHED'} ? ' badge-finished' :
                            (${project.status != null and project.status.name() == 'CANCELLED'} ? ' badge-cancelled' :
                            (${project.status != null and project.status.name() == 'ONGOING'} ? ' badge-ongoing' : ' badge-pending'))">
            </span>
        </div>

        <div class="kv-row">
            <span class="kv-label">Creation Date</span>
            <span class="kv-value"
                  th:text="${project.dateCreated}"></span>
        </div>

        <div class="kv-row">
            <span class="kv-label">Cost</span>
            <span class="kv-value"
                  th:text="${project.projectPrice} + ' €'"></span>
        </div>

        <div class="kv-row">
            <span class="kv-label">Year</span>
            <span class="kv-value"
                  th:text="${project.yearValue != null ? project.yearValue : 'No year assigned'}">
            </span>
        </div>
    </div>

    <div class="card p-4">
        <h2 class="section-title">Project Members</h2>

        <div class="empty-state"
             th:if="${project.memberNames == null or #lists.isEmpty(project.memberNames)}">
            <i class="bi bi-people display-6"></i>
            <p class="mb-0 mt-2">
                No members have been assigned to this project.
            </p>
        </div>

        <div class="d-flex flex-wrap gap-2"
             th:if="${project.memberNames != null and !#lists.isEmpty(project.memberNames)}">

            <span class="badge text-bg-light border p-2"
                  th:each="memberName : ${project.memberNames}"
                  th:text="${memberName}">
            </span>

        </div>
    </div>

</div>

</body>
</html>
