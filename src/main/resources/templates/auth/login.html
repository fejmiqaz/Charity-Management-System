<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login - Charity Management System</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #1f2937;
        }

        .login-container {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-header h1 {
            margin: 0 0 8px;
            font-size: 28px;
            line-height: 1.2;
            color: #111827;
        }

        .login-header p {
            margin: 0;
            color: #6b7280;
            font-size: 15px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            font-size: 14px;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            min-height: 46px;
            padding: 11px 13px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #ffffff;
            color: #111827;
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s ease,
            box-shadow 0.2s ease;
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .form-group input:focus {
            border-color: #2c7be5;
            box-shadow: 0 0 0 3px rgba(44, 123, 229, 0.15);
        }

        .login-btn {
            width: 100%;
            min-height: 48px;
            padding: 12px 16px;
            margin-top: 4px;
            background: #2c7be5;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease,
            transform 0.1s ease;
        }

        .login-btn:hover {
            background: #1a68d1;
        }

        .login-btn:active {
            transform: scale(0.99);
        }

        .login-btn:focus-visible {
            outline: 3px solid rgba(44, 123, 229, 0.3);
            outline-offset: 2px;
        }

        .message {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
        }

        .error-message {
            background: #ffe5e5;
            color: #a40000;
            border: 1px solid #ffc7c7;
        }

        .success-message {
            background: #e7f7e7;
            color: #176b17;
            border: 1px solid #bfe5bf;
        }

        .register-text {
            margin: 22px 0 0;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            line-height: 1.5;
        }

        .register-text a {
            color: #2c7be5;
            font-weight: 600;
            text-decoration: none;
        }

        .register-text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            .login-container {
                align-items: flex-start;
                padding: 20px 14px;
            }

            .login-card {
                margin-top: 8vh;
                padding: 24px 20px;
                border-radius: 12px;
            }

            .login-header {
                margin-bottom: 24px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }

        @media (max-width: 360px) {
            .login-container {
                padding: 14px 10px;
            }

            .login-card {
                padding: 22px 16px;
            }

            .login-header h1 {
                font-size: 22px;
            }
        }

        @media (max-height: 600px) and (orientation: landscape) {
            .login-container {
                align-items: flex-start;
                padding-top: 20px;
                padding-bottom: 20px;
            }

            .login-card {
                margin: 0;
            }
        }
    </style>
</head>

<body>

<div class="login-container">

    <main class="login-card">

        <div class="login-header">
            <h1>Sign In</h1>
            <p>Enter your credentials to access the Charity Management System.</p>
        </div>

        <div th:if="${param.error}"
             class="message error-message"
             role="alert">
            Invalid email or password.
        </div>

        <div th:if="${param.logout}"
             class="message success-message"
             role="status">
            You have been logged out successfully.
        </div>

        <form th:action="@{/login}" method="post">

            <div class="form-group">
                <label for="username">Email</label>

                <input type="email"
                       id="username"
                       name="username"
                       placeholder="Enter your email"
                       autocomplete="email"
                       inputmode="email"
                       required
                       autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>

                <input type="password"
                       id="password"
                       name="password"
                       placeholder="Enter your password"
                       autocomplete="current-password"
                       required>
            </div>

            <button type="submit" class="login-btn">
                Sign In
            </button>
        </form>

        <p class="register-text">
            Do not have an account?
            <a th:href="@{/register}">Create an account</a>
        </p>

    </main>

</div>

</body>
</html>
```
